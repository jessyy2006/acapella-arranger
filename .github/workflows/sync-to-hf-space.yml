name: Sync to Hugging Face Space

# Mirrors ``main`` of this GitHub repo into the Hugging Face Space's
# ``main`` branch on every push. This is the push-to-deploy loop —
# once set up, every git push to main triggers an HF Space rebuild
# in 1–2 minutes.
#
# Setup (one-time):
#   1. On HF, create a Streamlit Space at
#      https://huggingface.co/new-space?sdk=streamlit (any name).
#   2. Generate a write-scope HF access token at
#      https://huggingface.co/settings/tokens.
#   3. On this GitHub repo: Settings → Secrets and variables →
#      Actions → New repository secret:
#        - HF_TOKEN        — the token from step 2
#        - HF_USERNAME     — your HF username
#        - HF_SPACE_NAME   — the name chosen in step 1
#   4. Push any commit to main; this workflow runs, and the Space
#      rebuilds automatically.
#
# Not enabled by default — if you deploy elsewhere (Render, Fly,
# Community Cloud), delete this file or disable it via the Actions
# tab to avoid confused-deploy situations.

on:
  push:
    branches: [main]
  # ``workflow_dispatch`` adds a manual "Run workflow" button so we
  # can force-sync without waiting for a commit.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so ``git push`` to HF can fast-forward
          # cleanly. Without this, we'd hit a non-fast-forward on the
          # second run.
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "::error::Missing HF_TOKEN / HF_USERNAME / HF_SPACE_NAME repo secrets. See workflow header for setup."
            exit 1
          fi
          git push --force "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" main
