# Shared training config for the SATB harmony model.
#
# Base keys define the default run; the `phases:` block at the bottom
# carries per-phase overrides that deep-merge into the base when the
# trainer is invoked with `--phase pretrain` or `--phase finetune`.
# Unknown keys are rejected at config-load time — a typo here would
# silently waste a multi-hour Colab run.

seed: 42
device: auto                # auto | cuda | cpu
epochs: 25
batch_size: 16
num_workers: 2
amp: true                   # mixed precision — ~30% faster on T4
log_every: 50               # steps between stdout log lines
val_every: 1                # epochs between validation passes

model:
  class: hybrid             # hybrid | baseline (overridden by --model-class CLI)
  d_model: 256
  n_heads: 4
  n_encoder_layers: 3
  n_decoder_lstm_layers: 2  # hybrid only (ignored when class=baseline)
  n_decoder_layers: 2       # baseline only (ignored when class=hybrid)
  d_ff: 1024
  dropout: 0.1

data:
  processed_file: data/processed/train.pt
  val_file: data/processed/val.pt

optim:
  lr: 3.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0

scheduler:
  name: reduce_on_plateau
  factor: 0.5
  patience: 3
  min_lr: 1.0e-6

early_stopping:
  patience: 6                # val-loss epochs without improvement
  min_delta: 1.0e-4

checkpoint:
  dir: checkpoints
  run_name: run              # phase overrides this so runs don't collide
  save_every: 5              # epochs between `last.pt` writes (Drive rate limits)

reports:
  dir: reports

phases:
  pretrain:
    # Phase A: train from scratch on JSB chorales only (~278 train songs).
    # Full 25 epochs — the corpus is small relative to the model and the
    # run is idempotently resumable if Colab disconnects.
    epochs: 25
    data:
      processed_file: data/processed/train_jsb.pt
      val_file: data/processed/val_jsb.pt
    checkpoint:
      run_name: phase_a

  finetune:
    # Phase B: initialise from the Phase A checkpoint (--init-from on the
    # CLI) and continue on jaCappella (~35 train songs). ~10x lower LR per
    # the spec to avoid catastrophic forgetting of the JSB prior, and
    # fewer epochs because the corpus is small and overfits fast.
    epochs: 15
    optim:
      lr: 3.0e-5
    data:
      processed_file: data/processed/train_jacappella.pt
      val_file: data/processed/val_jacappella.pt
    checkpoint:
      run_name: phase_b
